# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - azuread

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        run: |
          # Next.js projekt se pretpostavlja da je u korijenu repozitorija
          npm install # Instaliraj sve ovisnosti, uključujući devDependencies za build
          npm run build # Ova komanda stvara optimizirani .next direktorij

      - name: Prepare artifact for deployment
        run: |
          # Kreiraj čisti direktorij koji će sadržavati samo potrebne produkcijske datoteke
          mkdir release_artifact

          # Kopiraj bitne Next.js build output i konfiguracijske datoteke
          cp -r .next release_artifact/ # Kompilirana Next.js aplikacija
          # Provjeri postoji li 'public' direktorij prije kopiranja
          if [ -d public ]; then
            cp -r public release_artifact/ # Statički asseti
          else
            echo "Warning: 'public' directory not found at $(pwd)/public. Skipping copy."
          fi
          cp package.json release_artifact/package.json
          cp next.config.ts release_artifact/next.config.ts # Važna Next.js konfiguracijska datoteka

          # Instaliraj samo produkcijske ovisnosti izravno u direktorij artefakta.
          cd release_artifact
          npm install --production
          cd .. # Vrati se u korijen repozitorija

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Putanja do pripremljenog direktorija artefakta u korijenu repozitorija
          path: release_artifact

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        # Artefakt je već pripremljen direktorij, pa samo trebamo premjestiti njegov sadržaj
        # u wwwroot. Pod pretpostavkom da je artefakt preuzet u trenutni direktorij.
        run: |
          mv node-app/* . # Premjesti sadržaj mape 'node-app' u trenutni direktorij (/home/site/wwwroot)
          rmdir node-app # Ukloni sada prazan direktorij 'node-app'

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_74767AAA0C114EE595DA584C1BE30256 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_60270B856F894D53AA38088389ED4A80 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D7F3A730224F4BCABCA860CB5EFD3BB3 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'azuread'
          slot-name: 'Production'
          package: . # Deployaj trenutni direktorij, koji sada sadrži pripremljeni artefakt
