# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - azuread

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        run: |
          npm install # Install all dependencies, including devDependencies for the build
          npm run build # This command creates the optimized .next directory

      - name: Prepare artifact for deployment
        run: |
          # Create a clean directory that will contain only the necessary production files
          mkdir release_artifact

          # Copy essential Next.js build output and configuration files
          cp -r .next release_artifact/ # The compiled Next.js application
          cp -r public release_artifact/ # Static assets
          cp package.json release_artifact/package.json
          cp next.config.ts release_artifact/next.config.ts # Important Next.js configuration

          # Install only production dependencies directly into the artifact directory.
          # This ensures node_modules are correctly placed and avoids symlink issues.
          cd release_artifact
          npm install --production
          cd ..

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release_artifact # Upload the prepared artifact directory

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        # The artifact is already a prepared directory, so we just need to move its contents
        # to the wwwroot. Assuming the artifact is downloaded to the current directory.
        run: |
          mv node-app/* . # Move contents of 'node-app' folder to current directory (/home/site/wwwroot)
          rmdir node-app # Remove the now empty 'node-app' directory

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_74767AAA0C114EE595DA584C1BE30256 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_60270B856F894D53AA38088389ED4A80 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D7F3A730224F4BCABCA860CB5EFD3BB3 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'azuread'
          slot-name: 'Production'
          package: . # Deploy the current directory, which now contains the prepared artifact
